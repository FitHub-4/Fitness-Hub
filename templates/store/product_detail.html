{% extends 'layout/base.html' %}
{% block content %}
<section class="product-detail-page container">
    <div class="product-detail-card">
        <div class="detail-image" style="background-image: url('{{ product.image_url }}');"></div>
        <div class="detail-info">
            <span class="product-category">{{ product.category }}</span>
            <h1>{{ product.name }}</h1>
            <p class="product-price">${{ product.price }}</p>
            <p>{{ product.description }}</p>
                        <div class="detail-actions">
                                <a class="button button-primary" href="{% url 'product-list' %}">Back to Shop</a>
                                <form method="post" action="{% url 'add-to-cart' product.slug %}" style="display:inline-block; margin-left:.5rem;">
                                    {% csrf_token %}
                                    {{ form.quantity }}
                                    <button class="button button-secondary" type="submit">Add to Cart</button>
                                </form>
                        </div>
        </div>
    </div>
</section>
{% endblock %}
