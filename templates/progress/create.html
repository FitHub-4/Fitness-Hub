{% extends 'layout/base.html' %}
{% block content %}
<section class="container py-5">
  <h1>Add Progress Record</h1>
  <p class="text-muted">Record strength metrics, reps, or hold times for your assigned goal exercises.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-secondary" href="{% url 'progress' %}">Cancel</a>
  </form>
</section>
{% endblock %}
