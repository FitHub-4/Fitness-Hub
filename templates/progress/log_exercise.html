{% extends 'layout/base.html' %}
{% block content %}
<section class="container py-5">
  <h1>Log Exercise: {{ exercise.name }}</h1>
  <p class="text-muted">Record your performance for this exercise.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-secondary" href="{% url 'exercise-detail' exercise.slug %}">Cancel</a>
  </form>
</section>
{% endblock %}
