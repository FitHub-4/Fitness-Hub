{% extends 'layout/base.html' %}
{% load static %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'progress/css/progress.css' %}">
{% endblock %}
{% block content %}
<section class="container py-5 progress-page">
  <div class="pr-form-wrap">
    <div class="pr-form-card">
      <div class="page-header">
        <h1>Edit Progress Record</h1>
        <p>Update your exercise metrics or body measurements</p>
      </div>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="pr-form-actions">
          <button class="btn btn-primary" type="submit">💾 Save</button>
          <a class="btn btn-secondary" href="{% url 'progress' %}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
