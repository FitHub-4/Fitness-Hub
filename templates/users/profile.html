{% extends 'layout/base.html' %}
{% block content %}
<section class="profile-page container">
    <div class="profile-card">
        <h1>Welcome back, {{ user.username }}!</h1>
        <p>From here, you can start a workout, shop products, or check your recent records and purchases.</p>
        <div class="profile-actions">
            <a class="button button-primary" href="{% url 'exercise-list' %}">Exercises</a>
            <a class="button button-primary" href="{% url 'product-list' %}">Products</a>
            <a class="button button-primary" href="{% url 'exercise-records' %}">Records</a>
            <a class="button button-primary" href="{% url 'purchase-history' %}">Purchases</a>
            <a class="button button-primary" href="{% url 'nutrition-calculator' %}">Nutrition</a>
        </div>
        <div class="profile-actions" style="margin-top: 1rem;">
            <a class="button button-secondary" href="{% url 'logout' %}">Logout</a>
            <a class="button button-secondary" href="{% url 'home' %}">Home</a>
        </div>
    </div>
</section>
{% endblock %}
