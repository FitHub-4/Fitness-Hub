{% extends 'layout/base.html' %}
{% block content %}
<section class="container py-5">
  <div class="page-head">
    <div class="page-head-text">
      <span class="icon-badge is-violet">✏️</span>
      <div>
        <h1>Edit Profile</h1>
        <p>Update your personal and fitness details.</p>
      </div>
    </div>
  </div>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">{{ uform.as_p }}</div>
    <div class="mb-3">{{ pform.as_p }}</div>
    <button class="btn btn-primary" type="submit"><span class="icon-inline">💾</span>Save</button>
    <a class="btn btn-secondary" href="{% url 'profile' %}"><span class="icon-inline">⬅</span>Cancel</a>
  </form>
</section>
{% endblock %}
