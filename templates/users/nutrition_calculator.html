{% extends 'layout/base.html' %}
{% block content %}
<section class="nutrition-page container">
    <div class="store-hero">
        <h1>Nutrition Calculator</h1>
        <p>Get personalized meal and calorie recommendations based on your profile.</p>
    </div>
    <div class="nutrition-card">
        <form method="post" class="nutrition-form">
            {% csrf_token %}
            <fieldset>
                <legend>Your Profile</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age (years)</label>
                        <input type="number" id="age" name="age" min="15" max="100" value="25" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" min="40" max="200" step="0.1" value="70" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" name="height" min="120" max="220" value="175" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Activity & Body Type</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="activity_level">Activity Level</label>
                        <select id="activity_level" name="activity_level" required>
                            <option value="sedentary">Sedentary (little/no exercise)</option>
                            <option value="light">Light (1-3 days/week)</option>
                            <option value="moderate" selected>Moderate (3-5 days/week)</option>
                            <option value="active">Active (6-7 days/week)</option>
                            <option value="very_active">Very Active (intense training)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="body_type">Body Type</label>
                        <select id="body_type" name="body_type" required>
                            <option value="ectomorph">Ectomorph (lean/skinny)</option>
                            <option value="mesomorph" selected>Mesomorph (athletic)</option>
                            <option value="endomorph">Endomorph (curvy/stocky)</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <button class="button button-primary" type="submit">Get My Recommendations</button>
        </form>
    </div>
</section>
{% endblock %}
