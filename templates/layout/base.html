{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Hub</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script defer src="{% static 'js/script.js' %}"></script>
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrapper">
            <a class="brand" href="{% url 'home' %}">Fitness Hub</a>
            <nav class="main-nav" id="mainNav">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'inspiration-feed' %}">Inspiration</a>
                <a href="{% url 'product-list' %}">Store</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}">Profile</a>
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}">Sign Up</a>
                {% endif %}
            </nav>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">Menu</button>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Fitness Hub © {% now 'Y' %} — Build strength, stay motivated, and move better every day.</p>
        </div>
    </footer>
</body>
</html>
